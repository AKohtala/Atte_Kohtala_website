  <script>
    (function() {
      if (window.location.pathname.includes('/en/') || sessionStorage.getItem('language_redirected')) {
        return;
      }
      const isBot = /bot|googlebot|crawler|spider|robot|crawling|lighthouse|pagespeed/i.test(navigator.userAgent);
      if (isBot) return;

      const userLang = navigator.language || navigator.userLanguage; 
      
      if (!userLang.startsWith('fi')) {
        sessionStorage.setItem('language_redirected', 'true');
        window.location.href = '/en/';
        }
      })();
  </script>

  <script>
    const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)')

    function updateTheme() {
      const theme = prefersDarkMode.matches ? 'dark' : 'light'
      document.documentElement.setAttribute('data-theme', theme)
    }

    updateTheme();
    prefersDarkMode.addEventListener("change", () => updateTheme());
  </script>
